<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    <div class="main-login">
        <div class="left-login">
            <h1>BEM-VINDO<br>Faça seu Login</h1>
            <img src="equipe.svg" class="left-login-image" alt="Team animation">
        </div>  
        <div class="right-login">
            <div class="card-login">
                <h1>LOGIN</h1>

                <div class="textfield">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usernameInput" name="usuario" placeholder="Usuário">
                </div>

                <div class="textfield">
                    <label for="senha">Senha</label>
                    <input type="password" id="passwordInput" name="senha" placeholder="Senha">
                </div>
                
                <p id="statusMessage" class="status-message"></p>
                <button id="loginBtn" class="btn-login">Login</button>

                <div style="margin-top: 20px; text-align: center;">
                    <a href="register.html" style="color: #f2f2f2; text-decoration: none; font-size: 14px;">Criar conta</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const existingToken = localStorage.getItem('authToken');
        if (existingToken) {
            window.location.href = 'dashboard.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');
            const statusMessage = document.getElementById('statusMessage');

            // Enable enter to login without press the button
            passwordInput.addEventListener('keypress', (event) => {
                if (event.key == 'Enter') {
                    event.preventDefault(); // Avoid reloading page
                    loginBtn.click(); // Press login button when press Enter
                }
            })

            loginBtn.addEventListener('click', async (event) => {
                event.preventDefault();

                statusMessage.textContent = 'Processando...';
                statusMessage.className = 'status-message';

                const requestBody = {
                    username: usernameInput.value.trim(), // trim is used to cut the spaces
                    password: passwordInput.value // Never put trim in passwords
                };

                try {
                    const response = await fetch('https://api-login-page-g9da.onrender.com/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': "application/json"
                        },
                        body: JSON.stringify(requestBody)
                    });

                    const responseData = await response.json();

                    if (response.ok){
                        statusMessage.textContent = 'Logado com sucesso! Redirecionando...';
                        statusMessage.className = 'status-message sucess-text';
                        localStorage.setItem('authToken', responseData.token);

                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    }
                    else{
                        statusMessage.textContent = responseData.error;
                        statusMessage.className = 'status-message error-text';
                    }
                } catch(error){
                    console.error('Connection error: ', error);
                    statusMessage.textContent = 'Falha ao conectar com o servidor.';
                    statusMessage.className = 'status-message error-text';
                }
            });
        });
    </script>
</body>

</html>
