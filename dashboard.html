<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">        
</head>
<body class="dashboard-bg">
    <div class="dashboard-container">
        <div class="header-area">
            <h1 id="welcomeMessage">Carregando...</h1>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Pesquisar anotações...">
    </div>

    <div class="input-area">
        <textarea id="noteInput" placeholder="Escreva sua nova anotação..."></textarea>
        <button id="saveNoteBtn" class="save-btn">Salvar nota</button>
    </div>

    <div id="notesContainer" class="notes-list">
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
